name: build_env
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      target_sha:
        required: true
        type: string
      ci_environment:
        required: false
        type: string
        default: automatic-ci-run

concurrency:
  group: ${{ github.workflow }}-${{ inputs.target_sha || (github.ref == github.ref_protected && github.run_id || github.event.pull_request.number || github.ref) }}
  cancel-in-progress: true

jobs:
  build-cuda-docker-env:
    runs-on: [self-hosted, linux]
    environment:
      name: ${{ inputs.ci_environment || 'automatic-ci-run' }}
    steps:
    - name: Checkout built branch
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.target_sha || github.sha }}
    - name: Check GPU visibility on runner
      run: |
        if command -v nvidia-smi; then
          nvidia-smi
        else
          /usr/lib/wsl/lib/nvidia-smi
        fi
    - name: Build CUDA similie_env image
      run: |
        DOCKER_BUILDKIT=1 docker build \
          --build-arg BACKEND=cuda \
          -t "similie_env:${{ inputs.target_sha || github.sha }}" \
          -t similie_env:latest \
          docker/similie_env

  build-cpu-docker-env:
    runs-on: [self-hosted, linux]
    environment:
      name: ${{ inputs.ci_environment || 'automatic-ci-run' }}
    steps:
    - name: Checkout built branch
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.target_sha || github.sha }}
    - name: Build CPU similie_env_cpu image
      run: |
        DOCKER_BUILDKIT=1 docker build \
          --build-arg BACKEND=cpu \
          --build-arg BASE_IMAGE=ubuntu:26.04 \
          -t "similie_env_cpu:${{ inputs.target_sha || github.sha }}" \
          -t similie_env_cpu:latest \
          docker/similie_env
