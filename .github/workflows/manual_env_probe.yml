name: manual_env_probe

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  manual-gpu-probe:
    runs-on: ubuntu-latest
    environment: manual-gpu
    steps:
      - name: Probe manual environment approval
        run: echo "manual-gpu environment approved"
