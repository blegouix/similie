name: example_kretschmann_scalar
on:
  workflow_run:
    workflows: [ build ]
    types: [ completed ]
  workflow_dispatch:
    inputs:
      target_sha:
        description: Commit SHA to run the example from
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ inputs.target_sha || github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  example-kretschmann_scalar:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, linux]
    environment:
      name: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request' && 'manual-ci-run' || 'automatic-ci-run' }}
    steps:
    - name: Select target commit
      id: target
      run: |
        if [ -n "${{ inputs.target_sha }}" ]; then
          target_sha="${{ inputs.target_sha }}"
        elif [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
          target_sha="${{ github.event.workflow_run.head_sha }}"
        else
          target_sha="${GITHUB_SHA}"
        fi
        echo "TARGET_SHA=${target_sha}" >> "${GITHUB_ENV}"
        echo "target_sha=${target_sha}" >> "${GITHUB_OUTPUT}"
    - name: Set build paths
      run: |
        echo "IMAGE_TAG=similie_env:${TARGET_SHA}" >> "${GITHUB_ENV}"
        echo "CACHE_ROOT=${RUNNER_TEMP}/similie-omp-workspace-${TARGET_SHA}" >> "${GITHUB_ENV}"
        rm -rf "${RUNNER_TEMP}/similie-omp-workspace-${TARGET_SHA}"
    - name: Restore OpenMP commit workspace
      uses: actions/cache/restore@v4
      with:
        path: ${{ runner.temp }}/similie-omp-workspace-${{ steps.target.outputs.target_sha }}
        key: similie-omp-workspace-${{ runner.os }}-${{ steps.target.outputs.target_sha }}
        fail-on-cache-miss: true
    - name: Run kretschmann_scalar with OpenMP
      run: |
        docker image inspect "${IMAGE_TAG}" >/dev/null
        docker run --rm \
          --user "$(id -u):$(id -g)" \
          -e HOME="${CACHE_ROOT}/home" \
          -e CACHE_ROOT="${CACHE_ROOT}" \
          -v "${CACHE_ROOT}:${CACHE_ROOT}" \
          -w "${CACHE_ROOT}/agent_build_omp" \
          "${IMAGE_TAG}" \
          bash -lc '
            set -euo pipefail
            git config --global --add safe.directory "*"
            cmake --build . --parallel 8 --target kretschmann_scalar
            first_run_log="$(mktemp)"
            set +e
            timeout --kill-after=30s 20m ./examples/kretschmann_scalar 2>&1 | tee "${first_run_log}"
            first_run_status="${PIPESTATUS[0]}"
            set -e
            if [ "${first_run_status}" -ne 0 ] && [ "${first_run_status}" -ne 124 ]; then
              exit "${first_run_status}"
            fi
            if ! grep -q "Please recompile" "${first_run_log}"; then
              echo "kretschmann_scalar first run did not request recompilation" >&2
              exit 1
            fi
            if [ ! -s irreps_dict.bin ]; then
              echo "kretschmann_scalar first run did not generate irreps_dict.bin" >&2
              exit 1
            fi
            cmake --build . --parallel 8 --target kretschmann_scalar # recompile to use irreps at compile time
            ./examples/kretschmann_scalar # perform actual kretschmann scalar computation
          '
